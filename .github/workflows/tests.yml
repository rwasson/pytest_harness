# tests.yml
# pytest_harness GitHub Actions workflow
#
# Purpose:
# - Runs the pytest_harness validation suite on Ubuntu, macOS, and Windows
# - Uses Python 3.13
# - Runs the example project
# - Runs Ruff, mypy, and Vulture
#
# Runs on:
# - every push
# - every pull request

name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pytest_harness and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Create validation log directory
        run: >
          python -c "from pathlib import Path;
          Path('developer_resources/pytest_harness_validation/logs').mkdir(
          parents=True, exist_ok=True)"

      - name: Run pytest_harness validation suite
        run: >
          python
          developer_resources/pytest_harness_validation/pytest_harness_validation_runner.py
        # continue-on-error: true   # should crash when returne exit code = 1

      - name: Run basic example project
        run: python examples/basic_project/pytest_runner.py

      - name: Run Ruff, mypy, and Vulture
        run: >
          python
          developer_resources/pytest_harness_validation/linter_runner.py
